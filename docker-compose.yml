version: '3.8'

services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
      - mysql

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./src:/var/www
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    command: --skip-name-resolve
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_resto
    ports:
      - "3306:3306"

  mailpit:
    image: 'axllent/mailpit:latest'
    ports:
      - "1025:1025" # Port SMTP (pour Laravel)
      - "8025:8025" # Interface Web (pour toi)